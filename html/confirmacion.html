<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bembos Delivery - Confirmación</title>
    <meta name="description" content="Pedido confirmado exitosamente">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Iconos -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.4/css/all.min.css">

    <!-- CSS -->
    <link rel="stylesheet" href="../css/style.css">
</head>

<body>

<header>
    <nav class="navbar navbar-expand-lg navbar-dark sticky-top custom-navbar">
        <div class="container">
            <a class="navbar-brand fw-bold" href="../html/index.html">
                <i class="fas fa-burger me-2"></i>Bembos Delivery
            </a>
        </div>
    </nav>
</header>

<main class="container py-5">

    <section class="text-center mb-5">
        <div class="success-icon mb-4">
            <i class="fas fa-check-circle fa-5x" style="color: var(--primary);"></i>
        </div>

        <h1 class="display-5 fw-bold mb-3">¡Pedido Confirmado!</h1>
        <p class="lead text-muted">Tu pedido está en camino</p>
    </section>

    <div class="row justify-content-center">

        <div class="col-lg-8">

            <!-- Detalle del pedido -->
            <div class="card custom-card mb-4">
                <div class="card-header text-white" style="background: var(--primary);">
                    <h5 class="mb-0">
                        <i class="fas fa-receipt me-2"></i>Detalles del Pedido
                    </h5>
                </div>

                <div class="card-body">

                    <div class="row mb-4">

                        <!-- Cliente -->
                        <div class="col-md-6">
                            <h6 class="fw-bold mb-2">
                                <i class="fas fa-user me-2"></i>Cliente
                            </h6>
                            <p class="mb-1" id="cliente-nombre"></p>
                            <p class="mb-1" id="cliente-telefono"></p>
                            <p class="mb-1" id="cliente-direccion"></p>
                            <p class="mb-0" id="cliente-zona"></p>
                        </div>

                        <!-- Tiempo de Entrega -->
                        <div class="col-md-6">
                            <h6 class="fw-bold mb-2">
                                <i class="fas fa-clock me-2"></i>Entrega
                            </h6>
                            <p class="h4 text-primary mb-2" id="tiempo-entrega"></p>
                            <small class="text-muted">Tiempo estimado de llegada</small>
                        </div>

                    </div>

                    <!-- Productos -->
                    <h6 class="fw-bold mb-3">
                        <i class="fas fa-shopping-bag me-2"></i>Productos
                    </h6>

                    <div id="productos-confirmacion" class="mb-4">
                    </div>

                    <hr>

                    <div class="row">

                        <div class="col-md-6">
                            <h6 class="fw-bold">
                                <i class="fas fa-credit-card me-2"></i>Método de Pago
                            </h6>
                            <p id="metodo-pago"></p>
                        </div>

                        <div class="col-md-6 text-end">

                            <div class="d-flex justify-content-between">
                                <span>Subtotal:</span>
                                <span id="subtotal-confirmacion"></span>
                            </div>

                            <div class="d-flex justify-content-between">
                                <span>Delivery:</span>
                                <span id="delivery-confirmacion"></span>
                            </div>

                            <hr>

                            <div class="d-flex justify-content-between total-box">
                                <strong>Total:</strong>
                                <strong class="total-price" id="total-confirmacion"></strong>
                            </div>

                        </div>

                    </div>

                </div>
            </div>

            <!-- Acciones -->
            <div class="card custom-card text-center">
                <div class="card-body">

                    <h5 class="mb-3">¿Qué deseas hacer ahora?</h5>

                    <div class="d-flex flex-column flex-md-row gap-3 justify-content-center">

                        <a href="index.html" class="btn btn-primary">
                            <i class="fas fa-arrow-left me-2"></i>Seguir comprando
                        </a>

                        <button class="btn btn-outline-primary" onclick="imprimirConfirmacion()">
                            <i class="fas fa-print me-2"></i>Imprimir
                        </button>

                    </div>

                    <hr class="my-4">

                    <!-- Contacto -->
                    <div class="row text-center">

                        <div class="col-md-6">
                            <i class="fas fa-phone me-2" style="color: var(--primary);"></i>
                            <span>(01) 123-4567</span>
                        </div>

                        <div class="col-md-6">
                            <i class="fas fa-envelope me-2" style="color: var(--primary);"></i>
                            <span>pedidos@bembos.com</span>
                        </div>

                    </div>

                </div>
            </div>

        </div>

    </div>

</main>

<footer class="text-white py-4 mt-5 text-center">
    <p>© 2026 Bembos Delivery</p>
</footer>

<!-- JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="../js/common.js"></script>
<script src="../js/confirmacion.js"></script>

</body>
</html>
